<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#41000A"/>
      <stop offset="65%" stop-color="#2A0007"/>
      <stop offset="100%" stop-color="#170004"/>
    </radialGradient>
    <linearGradient id="cream" x1="180" y1="120" x2="850" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF3D7"/>
      <stop offset="0.55" stop-color="#F7DDAF"/>
      <stop offset="1" stop-color="#FFEFCF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <circle cx="512" cy="512" r="500" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="462" stroke="url(#cream)" stroke-width="6"/>
  <circle cx="512" cy="512" r="492" stroke="#2A0007" stroke-width="18"/>

  <!-- chef hat -->
  <g fill="none" stroke="url(#cream)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <path d="M421 286v-62c-54 10-91-16-91-58 0-39 32-67 73-62 15-51 54-83 106-83 55 0 95 33 109 84 45-9 83 19 83 62 0 41-36 67-88 58v61"/>
    <path d="M414 346c25-56 78-82 143-73 49 7 83 36 98 73"/>
    <path d="M386 360h252"/>
    <path d="M459 330c10-28 30-46 62-55"/>
    <path d="M496 221c-23-32-23-57 0-86"/>
    <path d="M535 224c-19-30-16-54 5-79"/>
    <path d="M574 226c-18-28-15-51 5-74"/>
  </g>
  <circle cx="512" cy="256" r="10" fill="url(#cream)" filter="url(#shadow)"/>

  <!-- text -->
  <g fill="url(#cream)" filter="url(#shadow)">
    <text x="88" y="562" font-family="Brush Script MT, Pacifico, Lobster, cursive" font-size="230" font-weight="700" letter-spacing="-8">Bhojan</text>
    <text x="210" y="805" font-family="Brush Script MT, Pacifico, Lobster, cursive" font-size="230" font-weight="700" letter-spacing="-8">Mitra</text>
  </g>

  <!-- decorative splash -->
  <g stroke="url(#cream)" stroke-width="16" stroke-linecap="round" filter="url(#shadow)">
    <path d="M846 333c18-35 34-53 52-60"/>
    <path d="M877 380c35-13 57-16 77-8"/>
    <path d="M873 425c32 3 54 10 70 24"/>
  </g>

  <!-- underline -->
  <g stroke="url(#cream)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)">
    <path d="M545 832c121-4 245-12 359-24"/>
    <path d="M533 858c129-8 268-14 384-28"/>
